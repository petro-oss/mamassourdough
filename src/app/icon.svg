<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bread loaf body -->
  <ellipse cx="16" cy="20" rx="13" ry="9" fill="#C8860A"/>
  <!-- Bread dome top -->
  <ellipse cx="16" cy="14" rx="11" ry="8" fill="#D4930C"/>
  <!-- Crust highlight -->
  <ellipse cx="16" cy="13" rx="9" ry="6" fill="#E8A020"/>
  <!-- Score marks (slashes on top of loaf) -->
  <line x1="11" y1="10" x2="15" y2="17" stroke="#A06808" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="9" x2="19" y2="16" stroke="#A06808" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="19" y1="10" x2="23" y2="17" stroke="#A06808" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bottom shadow -->
  <ellipse cx="16" cy="27" rx="11" ry="2.5" fill="#8B5E04" opacity="0.4"/>
</svg>
